<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARMA Group — Building Bangladesh Since 1985</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#004d00; --ink2:#004d00; --green:#008000;
  --green-mid:#00a800; --green-pale:#e6f2e6; --gold:#C9A84C;
  --gold-light:#F7EDD4; --off:#F4F6F4; --white:#FFFFFF;
  --muted:#336633; --border:#b3d9b3;
}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--off);color:var(--ink);overflow-x:hidden;line-height:1.6;cursor:none}
img{display:block;max-width:100%;object-fit:cover}
a{color:inherit;text-decoration:none}

/* ── CUSTOM MAGNETIC CURSOR ── */
#cur-outer{
  position:fixed;width:36px;height:36px;
  border:1.5px solid var(--gold);border-radius:50%;
  pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
  transition:width .3s,height .3s,border-color .3s,background .3s;
  mix-blend-mode:normal;
}
#cur-inner{
  position:fixed;width:6px;height:6px;
  background:var(--gold);border-radius:50%;
  pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
  transition:width .15s,height .15s,background .2s;
}
body.cursor-hover #cur-outer{width:56px;height:56px;background:rgba(201,168,76,.08);border-color:var(--gold)}
body.cursor-hover #cur-inner{width:4px;height:4px}
body.cursor-click #cur-outer{width:28px;height:28px;background:rgba(201,168,76,.2)}

/* ── LOADING SCREEN ── */
#loader{
  position:fixed;inset:0;z-index:10000;
  background:var(--ink);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:24px;
}
#loader-logo{
  font-family:'Bebas Neue',sans-serif;font-size:64px;letter-spacing:6px;
  color:var(--white);opacity:0;
}
#loader-logo span{color:var(--gold)}
#loader-bar-wrap{width:200px;height:2px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
#loader-bar{height:100%;width:0%;background:var(--gold);border-radius:2px;transition:width .05s linear}
#loader-pct{font-size:11px;letter-spacing:3px;color:rgba(255,255,255,.35);font-weight:500}

/* ── NAV ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:500;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 5%;height:64px;
  transition:background .4s,border-color .4s,transform .4s;
  border-bottom:1px solid transparent;
}
nav.scrolled{background:rgba(0,77,0,0.97);border-color:rgba(201,168,76,0.18);backdrop-filter:blur(14px)}
nav.hidden{transform:translateY(-100%)}
.nav-logo{display:flex;align-items:center;gap:11px}
.nav-logo-sq{
  width:34px;height:34px;background:var(--gold);border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--ink);
}
.nav-logo-words{line-height:1.15}
.nav-logo-words strong{display:block;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;color:var(--white)}
.nav-logo-words small{font-size:9px;color:var(--gold);letter-spacing:2.5px;text-transform:uppercase}
.nav-links{display:flex;align-items:center;gap:28px;list-style:none}
.nav-links a{font-size:12px;font-weight:500;letter-spacing:.5px;color:rgba(255,255,255,.65);transition:color .2s;text-transform:uppercase;position:relative}
.nav-links a::after{content:'';position:absolute;bottom:-2px;left:0;width:0;height:1px;background:var(--gold);transition:width .3s}
.nav-links a:hover{color:var(--gold)}
.nav-links a:hover::after{width:100%}
.nav-cta{background:var(--gold)!important;color:var(--ink)!important;padding:8px 18px;border-radius:2px;font-weight:600!important;letter-spacing:.5px;transition:background .2s!important}
.nav-cta:hover{background:#dbb94f!important}
.nav-cta::after{display:none!important}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:none;padding:4px}
.hamburger span{display:block;width:22px;height:1.5px;background:var(--white);transition:all .3s}

/* ── HERO ── */
.hero{
  position:relative;min-height:100vh;
  display:flex;flex-direction:column;justify-content:flex-end;
  overflow:hidden;
}
#hero-canvas{position:absolute;inset:0;z-index:1}
.hero-bg{
  position:absolute;inset:0;z-index:0;
  background:url('https://images.unsplash.com/photo-1504307651254-35680f356dfd?w=1600&auto=format&fit=crop&q=80') center/cover no-repeat;
}
.hero-overlay{
  position:absolute;inset:0;z-index:2;
  background:linear-gradient(to top,rgba(6,18,8,0.96) 0%,rgba(6,18,8,.6) 45%,rgba(6,18,8,.25) 100%);
}
.hero-content{
  position:relative;z-index:3;
  padding:0 5% 80px;max-width:960px;
}
.hero-tag{display:inline-flex;align-items:center;gap:8px;margin-bottom:28px;overflow:hidden}
.hero-tag-dot{width:6px;height:6px;background:var(--gold);border-radius:50%;animation:blink 2.5s infinite}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.6)}}
.hero-tag span{font-size:11px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold)}

/* Split-text headline — each word is a div we animate */
.hero-headline{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(64px,10vw,140px);
  line-height:.92;letter-spacing:2px;
  margin-bottom:36px;overflow:hidden;
}
.hero-headline .hl-line{overflow:hidden;display:block}
.hero-headline .hl-word{display:inline-block;transform:translateY(110%);color:var(--white)}
.hero-headline .hl-word.outline{-webkit-text-stroke:1.5px var(--white);color:transparent}
.hero-headline .hl-word.gold{color:var(--gold)}

.hero-bottom{display:flex;align-items:flex-end;justify-content:space-between;gap:32px;flex-wrap:wrap}
.hero-desc{font-size:15px;color:rgba(255,255,255,0);line-height:1.75;max-width:440px}/* starts invisible */
.hero-actions{display:flex;gap:14px;flex-shrink:0;flex-wrap:wrap;align-items:center;opacity:0}
.btn-gold{
  background:var(--gold);color:var(--ink);padding:13px 26px;border-radius:2px;
  font-size:13px;font-weight:600;letter-spacing:.5px;border:none;cursor:none;
  transition:transform .2s,box-shadow .2s;display:inline-block;text-transform:uppercase;
  position:relative;overflow:hidden;
}
.btn-gold::before{
  content:'';position:absolute;top:50%;left:50%;
  width:0;height:0;background:rgba(255,255,255,.25);
  border-radius:50%;transform:translate(-50%,-50%);
  transition:width .5s,height .5s;
}
.btn-gold:hover::before{width:300px;height:300px}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(201,168,76,.35)}
.btn-ghost{
  background:transparent;color:var(--white);padding:13px 26px;border-radius:2px;
  font-size:13px;font-weight:500;letter-spacing:.5px;border:1px solid rgba(255,255,255,.35);
  transition:all .2s;display:inline-block;text-transform:uppercase;cursor:none;
}
.btn-ghost:hover{border-color:rgba(255,255,255,.75);background:rgba(255,255,255,.06)}

/* Scroll pill */
.scroll-hint{
  position:absolute;bottom:28px;left:50%;transform:translateX(-50%);z-index:3;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  animation:bounce 2.5s ease-in-out infinite;
}
@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(8px)}}
.scroll-hint span{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.35)}
.scroll-mouse{
  width:22px;height:36px;border:1.5px solid rgba(255,255,255,.3);
  border-radius:12px;display:flex;justify-content:center;padding-top:6px;
}
.scroll-mouse::after{
  content:'';width:3px;height:6px;background:var(--gold);border-radius:3px;
  animation:scrollwheel 1.8s ease-in-out infinite;
}
@keyframes scrollwheel{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(10px)}}

/* ── MARQUEE ── */
.marquee-wrap{
  background:var(--gold);padding:14px 0;overflow:hidden;
  position:relative;z-index:4;
}
.marquee-track{
  display:flex;gap:0;width:max-content;
  animation:marquee 28s linear infinite;
}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.marquee-item{
  display:flex;align-items:center;gap:20px;padding:0 32px;
  font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--ink);
  white-space:nowrap;
}
.marquee-dot{width:5px;height:5px;background:var(--ink);border-radius:50%;opacity:.4}

/* ── STAT BAR ── */
.statbar{background:var(--ink);display:grid;grid-template-columns:repeat(4,1fr);border-top:2px solid var(--gold)}
.statbar-item{
  padding:32px 24px;border-right:1px solid rgba(255,255,255,.07);
  text-align:center;position:relative;overflow:hidden;
}
.statbar-item::before{
  content:'';position:absolute;inset:0;background:var(--green);
  transform:scaleY(0);transform-origin:bottom;transition:transform .4s cubic-bezier(.4,0,.2,1);
}
.statbar-item:hover::before{transform:scaleY(1)}
.statbar-item:last-child{border-right:none}
.statbar-num{
  font-family:'Bebas Neue',sans-serif;font-size:56px;color:var(--gold);
  line-height:1;margin-bottom:6px;letter-spacing:1px;position:relative;z-index:1;
}
.statbar-label{font-size:11px;color:rgba(255,255,255,.45);letter-spacing:1.5px;text-transform:uppercase;position:relative;z-index:1}

/* ── TIMELINE ── */
.timeline-section{background:var(--white);padding:100px 5% 80px;overflow:hidden}
.tl-header{margin-bottom:64px}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--green);margin-bottom:14px;display:block}
.big-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(42px,6vw,80px);letter-spacing:1px;line-height:1;color:var(--ink)}
.tl-track{display:flex;gap:0;overflow-x:auto;padding-bottom:32px;scrollbar-width:thin;scrollbar-color:var(--gold) var(--border);cursor:grab;user-select:none}
.tl-track:active{cursor:grabbing}
.tl-track::-webkit-scrollbar{height:3px}
.tl-track::-webkit-scrollbar-track{background:var(--border)}
.tl-track::-webkit-scrollbar-thumb{background:var(--gold)}
.tl-item{flex:0 0 220px;padding:0 24px 0 0;position:relative}
.tl-item::before{content:'';position:absolute;top:20px;left:0;right:0;height:1px;background:var(--border)}
.tl-line-fill{position:absolute;top:20px;left:0;height:1px;background:var(--gold);width:0;transition:width .6s ease;z-index:1}
.tl-dot{width:10px;height:10px;border-radius:50%;border:2px solid var(--green);background:var(--white);position:relative;z-index:2;margin-bottom:16px;transition:all .3s}
.tl-item.passed .tl-dot{background:var(--gold);border-color:var(--gold);box-shadow:0 0 0 4px rgba(201,168,76,.2)}
.tl-year{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--green);letter-spacing:1px;margin-bottom:6px}
.tl-event{font-size:13px;color:var(--muted);line-height:1.6}
.tl-event strong{display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:4px}

/* ── ABOUT ── */
.about-section{background:var(--off);padding:0}
.about-split{display:grid;grid-template-columns:1fr 1fr;min-height:640px}
.about-img{position:relative;overflow:hidden;background:var(--ink);min-height:400px}
.about-img-inner{
  position:absolute;inset:-10%;
  background:url('https://images.unsplash.com/photo-1581094794329-c8112a89af12?w=900&auto=format&fit=crop&q=80') center/cover no-repeat;
  will-change:transform;
}
.about-img-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,77,0,.65) 0%,transparent 60%)}
.about-img-badge{position:absolute;bottom:32px;left:32px;background:var(--gold);padding:18px 22px;border-radius:2px;transform:translateY(20px);opacity:0;transition:all .6s .3s}
.about-img-badge.visible{transform:translateY(0);opacity:1}
.about-img-badge strong{display:block;font-family:'Bebas Neue',sans-serif;font-size:48px;color:var(--ink);line-height:1}
.about-img-badge span{font-size:11px;color:var(--ink2);font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.about-body{padding:80px 8%;display:flex;flex-direction:column;justify-content:center;background:var(--white)}
.about-body p{font-size:15px;color:var(--muted);line-height:1.85;margin-bottom:20px}
.pillar-row{display:flex;gap:0;margin-top:36px;border-top:1px solid var(--border);padding-top:32px}
.pillar{flex:1;padding-right:24px;border-right:1px solid var(--border);transition:all .3s}
.pillar:last-child{border-right:none;padding-right:0;padding-left:24px}
.pillar:hover{transform:translateY(-3px)}
.pillar-icon{width:32px;height:32px;background:var(--green-pale);border-radius:4px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;transition:background .3s}
.pillar:hover .pillar-icon{background:var(--green);} 
.pillar:hover .pillar-icon svg{stroke:var(--white)}
.pillar-icon svg{width:16px;height:16px;stroke:var(--green);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:stroke .3s}
.pillar h4{font-size:12px;font-weight:600;color:var(--ink);margin-bottom:4px}
.pillar p{font-size:12px;color:var(--muted);line-height:1.6;margin:0}

/* ── SECTORS — mosaic with clip-path reveal ── */
.sectors{padding:100px 5%;background:var(--ink)}
.sectors .eyebrow{color:var(--gold)}
.sectors-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(42px,6vw,80px);color:var(--white);letter-spacing:1px;line-height:1;margin-bottom:64px}
.sectors-grid{display:grid;grid-template-columns:2fr 1fr 1fr;grid-template-rows:320px 320px;gap:3px}
.sector-panel{position:relative;overflow:hidden;cursor:none;clip-path:inset(100% 0 0 0);transition:clip-path 0s}
.sector-panel.revealed{clip-path:inset(0% 0 0 0);transition:clip-path .8s cubic-bezier(.4,0,.2,1)}
.sector-panel:nth-child(1){grid-row:1/3}
.sector-panel img{width:100%;height:100%;object-fit:cover;transition:transform .7s cubic-bezier(.4,0,.2,1);display:block}
.sector-panel:hover img{transform:scale(1.06)}
.sector-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,26,0,.88) 0%,rgba(0,26,0,.5) 40%,transparent 75%);transition:background .5s}
.sector-panel:hover .sector-overlay{background:linear-gradient(to top,rgba(201,168,76,.82) 0%,rgba(201,168,76,.35) 30%,transparent 60%)}
.sector-body{position:absolute;bottom:0;left:0;right:0;padding:28px}
.sector-cat{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.sector-name{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--white);letter-spacing:1px;line-height:1.1;margin-bottom:8px;transform:translateY(0);transition:transform .3s}
.sector-panel:nth-child(1) .sector-name{font-size:44px}
.sector-panel:hover .sector-name{transform:translateY(-4px)}
.sector-desc{font-size:12px;color:rgba(255,255,255,.6);line-height:1.6;max-width:300px;opacity:0;transform:translateY(8px);transition:all .35s .05s}
.sector-panel:hover .sector-desc{opacity:1;transform:translateY(0)}
.sector-arrow{display:inline-flex;align-items:center;gap:6px;margin-top:12px;font-size:11px;font-weight:600;color:var(--gold);letter-spacing:.5px;text-transform:uppercase;opacity:0;transform:translateX(-8px);transition:all .3s .1s}
.sector-panel:hover .sector-arrow{opacity:1;transform:translateX(0)}

/* ── CLIENTS ── */
.clients-section{background:var(--off);padding:80px 5%}
.clients-label{display:flex;align-items:center;gap:20px;margin-bottom:48px}
.clients-label span{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.clients-label::after{content:'';flex:1;height:1px;background:var(--border)}
.clients-scroll{display:flex;gap:12px;flex-wrap:wrap}
.client-pill{
  display:flex;align-items:center;gap:10px;background:var(--white);border:1px solid var(--border);
  border-radius:100px;padding:10px 18px;font-size:12px;font-weight:500;color:var(--muted);
  transition:all .25s;white-space:nowrap;cursor:none;
  transform:translateY(20px);opacity:0;
}
.client-pill.visible{transform:translateY(0);opacity:1}
.client-pill:hover{border-color:var(--green);color:var(--green);background:var(--green-pale);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,128,0,.12)}
.client-pill-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}

/* ── CHAIRMAN ── */
.chairman-section{background:var(--ink2);padding:100px 5%}
.chairman-inner{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center}
.chairman-photo{position:relative}
.chairman-photo-frame{
  width:100%;aspect-ratio:3/4;overflow:hidden;border-radius:2px;position:relative;
}
.chairman-photo-inner{
  position:absolute;inset:-15%;
  background:url('https://images.unsplash.com/photo-1556157382-97eda2d62296?w=700&auto=format&fit=crop&q=80') center/cover no-repeat;
  will-change:transform;
}
.chairman-photo-inner::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,77,0,.6) 0%,transparent 50%)}
.chairman-accent{position:absolute;bottom:-16px;right:-16px;width:100px;height:100px;background:var(--gold);border-radius:2px;z-index:-1}
.chairman-text .eyebrow{color:var(--gold)}
.chairman-q{
  font-family:'Playfair Display',serif;font-size:clamp(18px,2.2vw,26px);
  color:var(--white);line-height:1.6;font-style:italic;margin-bottom:32px;
  position:relative;padding-left:28px;
}
.chairman-q::before{
  content:'';position:absolute;left:0;top:4px;bottom:4px;
  width:3px;background:var(--gold);border-radius:2px;
}
.chairman-sig{border-top:1px solid rgba(255,255,255,.12);padding-top:24px}
.chairman-sig strong{display:block;font-size:15px;font-weight:600;color:var(--white);margin-bottom:2px}
.chairman-sig span{font-size:12px;color:rgba(255,255,255,.4)}

/* ── CERTS ── */
.certs-section{background:var(--white);padding:80px 5%}
.certs-row{display:flex;flex-wrap:wrap;gap:16px;margin-top:48px}
.cert{
  display:flex;align-items:center;gap:14px;border:1px solid var(--border);
  border-radius:2px;padding:16px 22px;background:var(--off);
  transition:all .3s;transform:translateX(-20px);opacity:0;cursor:none;
}
.cert.visible{transform:translateX(0);opacity:1}
.cert:hover{border-color:var(--green);box-shadow:0 4px 24px rgba(0,128,0,.12);transform:translateX(4px) !important}
.cert-icon-box{width:40px;height:40px;background:var(--gold-light);border-radius:2px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .3s}
.cert:hover .cert-icon-box{background:var(--gold)}
.cert-icon-box svg{width:20px;height:20px;stroke:var(--gold);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:stroke .3s}
.cert:hover .cert-icon-box svg{stroke:var(--ink)}
.cert strong{display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:2px}
.cert span{font-size:11px;color:var(--muted)}

/* ── CAREER ── */
.career-banner{
  background:url('https://images.unsplash.com/photo-1521737604893-d14cc237f11d?w=1400&auto=format&fit=crop&q=80') center/cover no-repeat;
  position:relative;padding:100px 5%;
}
.career-banner::before{content:'';position:absolute;inset:0;background:rgba(0,77,0,.83)}
.career-inner{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:32px}
.career-inner .eyebrow{color:var(--gold)}
.career-h{font-family:'Bebas Neue',sans-serif;font-size:clamp(36px,5vw,64px);color:var(--white);letter-spacing:1px;line-height:1;margin-bottom:14px}
.career-p{font-size:15px;color:rgba(255,255,255,.6);max-width:440px;line-height:1.75}

/* ── CONTACT ── */
.contact-section{background:var(--ink);padding:100px 5%}
.contact-section .eyebrow{color:var(--gold)}
.contact-grid{display:grid;grid-template-columns:1fr 1.4fr;gap:72px;margin-top:64px;align-items:start}
.contact-info p{font-size:15px;color:rgba(255,255,255,.55);line-height:1.85;margin-bottom:36px}
.c-detail{display:flex;align-items:flex-start;gap:14px;margin-bottom:22px;transition:transform .25s}
.c-detail:h
